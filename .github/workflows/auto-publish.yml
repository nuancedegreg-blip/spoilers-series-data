name: Auto Publish Spoilers

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Discover potential sources
        working-directory: ${{ github.workspace }}
        run: |
          python3 discover_sources.py

      - name: Generate spoilers from allowed sources
        working-directory: ${{ github.workspace }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          MAX_SPOILERS_PER_DAY: "3"
          SOURCE_ITEM_LIMIT: "3"
        run: |
          python3 generate_spoilers.py

      - name: Publish if spoilers changed
        working-directory: ${{ github.workspace }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          MAX_SPOILERS_PER_DAY: "3"
          SOURCE_ITEM_LIMIT: "3"
          SKIP_PIPELINE_STEPS: "1"
        run: |
          chmod +x ./publish.sh
          ./publish.sh
